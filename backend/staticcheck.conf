# staticcheck configuration for Qorven backend.
# Enforced on every CI run via `make staticcheck`.
# U1000 (dead code) is excluded — in-progress features intentionally have
# unexported symbols that aren't wired yet.
# SA1019 (deprecated) is excluded — nhooyr.io/websocket deprecation is tracking
# upstream and will be migrated separately.
checks = ["all", "-U1000", "-SA1019"]

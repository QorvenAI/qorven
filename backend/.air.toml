# air — hot-reload + auto-restart for `make dev-watch`.
# https://github.com/air-verse/air
#
# Restart-on-crash is the point here: any panic in development kills
# the gateway, but air brings it right back. Combined with the port
# probe in internal/gateway/resilience.go, a stale listener from the
# previous run won't block the new process.

root = "."
tmp_dir = "tmp"

[build]
  # Build command mirrors `make dev` (without the -ldflags — not worth
  # the extra 200ms per reload in dev).
  cmd = "go build -ldflags \"-X github.com/qorvenai/qorven/cmd.Version=v0.1.11-alpha\" -o ./tmp/qorven ."
  bin = "./tmp/qorven"
  # Run with the same start subcommand the production binary uses.
  full_bin = "./tmp/qorven start"
  # Watch these dirs for changes. Tests and docs don't trigger rebuild.
  include_ext = ["go", "toml", "yaml"]
  include_dir = ["cmd", "internal"]
  exclude_dir = ["tmp", "dist", "vendor", "testdata"]
  exclude_file = ["*_test.go"]
  # Give the server time to start before declaring a crash loop.
  delay = 500
  # Send SIGTERM first so the graceful-shutdown handler gets its drain
  # window; SIGKILL after 12s if it hasn't exited on its own.
  kill_delay = "12s"
  send_interrupt = true
  stop_on_error = false
  log = "air_errors.log"

[log]
  time = true

[misc]
  clean_on_exit = true
